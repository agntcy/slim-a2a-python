---
version: v2
inputs:
  - git_repo: https://github.com/a2aproject/A2A.git
    ref: v1.0.0
    subdir: specification
managed:
  enabled: true
plugins:
  # Generate python protobuf related code
  # Generates _pb2_slimrpc.py files
  - local: protoc-gen-slimrpc-python
    out: slima2a/types/v1
    opt:
      - 'types_import=from a2a.types import a2a_pb2 as a2a__pb2'
